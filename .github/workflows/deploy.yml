name: Deploy to AWS Lambda (Tel Aviv)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: il-central-1

      - name: Delete stack if stuck or has incompatible resource types
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name pikud-haoref-bot \
            --region il-central-1 \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Current stack status: $STATUS"
          SHOULD_DELETE=false

          case "$STATUS" in
            ROLLBACK_COMPLETE|UPDATE_ROLLBACK_COMPLETE|ROLLBACK_FAILED|UPDATE_ROLLBACK_FAILED|CREATE_FAILED)
              echo "Stack is in a stuck state, will delete."
              SHOULD_DELETE=true
              ;;
          esac

          # Also delete if stack still contains old AWS::Scheduler::Schedule resource
          if [ "$STATUS" != "DOES_NOT_EXIST" ] && [ "$SHOULD_DELETE" = "false" ]; then
            OLD_RESOURCE=$(aws cloudformation describe-stack-resources \
              --stack-name pikud-haoref-bot \
              --region il-central-1 \
              --query "StackResources[?ResourceType=='AWS::Scheduler::Schedule'].ResourceType" \
              --output text 2>/dev/null)
            if [ -n "$OLD_RESOURCE" ]; then
              echo "Stack has old AWS::Scheduler::Schedule resource, will delete to migrate."
              SHOULD_DELETE=true
            fi
          fi

          if [ "$SHOULD_DELETE" = "true" ]; then
            aws cloudformation delete-stack --stack-name pikud-haoref-bot --region il-central-1
            aws cloudformation wait stack-delete-complete --stack-name pikud-haoref-bot --region il-central-1
            echo "Stack deleted."
          else
            echo "No cleanup needed."
          fi

      - name: Build
        run: sam build

      - name: Deploy
        run: |
          sam deploy \
            --stack-name pikud-haoref-bot \
            --region il-central-1 \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides SlackWebhookUrl=${{ secrets.SLACK_WEBHOOK_URL }}
