name: Deploy to AWS Lambda (Tel Aviv)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: il-central-1

      - name: Delete stack if in ROLLBACK_COMPLETE
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name pikud-haoref-bot \
            --region il-central-1 \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack is in ROLLBACK_COMPLETE, deleting before redeploy..."
            aws cloudformation delete-stack --stack-name pikud-haoref-bot --region il-central-1
            aws cloudformation wait stack-delete-complete --stack-name pikud-haoref-bot --region il-central-1
            echo "Stack deleted."
          else
            echo "Stack status: $STATUS — no cleanup needed."
          fi

      - name: Build
        run: sam build

      - name: Deploy
        run: |
          sam deploy \
            --stack-name pikud-haoref-bot \
            --region il-central-1 \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides SlackWebhookUrl=${{ secrets.SLACK_WEBHOOK_URL }}
